<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Hunt: Kenali Frasa Nama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        
        body {
            /* Fallback Comic Sans, otherwise Comic Neue */
            font-family: 'Comic Sans MS', 'Comic Sans', 'Comic Neue', cursive; 
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Minecraft Sky Blue */
            touch-action: none; /* Prevent scroll on touch */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Center Panel - pointer-events: none is CRITICAL so clicks pass through to canvas */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.85); /* Slate 800 */
            border: 4px solid #4ade80; /* Minecraft green vibe */
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            max-width: 90%;
            width: 600px;
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active {
            animation: shake 0.4s;
            animation-iteration-count: 1;
        }

        /* Start Button */
        .btn-start {
            pointer-events: auto; /* Make it clickable */
            background: #8B4513; /* Dirt color */
            border-bottom: 4px solid #5C2E0B;
            transition: transform 0.1s;
        }
        .btn-start:active {
            transform: translateY(4px);
            border-bottom: 0px;
        }
        
        .btn-restart {
            pointer-events: auto;
            background: #10b981;
            border-bottom: 4px solid #047857;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        
        <!-- Start Screen -->
        <div id="start-screen" class="glass-panel p-8 rounded-xl text-center flex flex-col items-center pointer-events-auto">
            <h1 class="text-4xl text-green-400 mb-2 drop-shadow-md">Duck Hunt: Frasa Nama</h1>
            <p class="text-white mb-6 text-lg">Cari itik yang membawa jawapan betul menggunakan lampu suluh dan tembak!</p>
            <button id="start-btn" class="btn-start text-white text-2xl font-bold py-3 px-8 rounded">Mula Main</button>
        </div>

        <!-- Question Panel -->
        <div id="question-panel" class="glass-panel p-6 rounded-xl text-center hidden flex-col items-center">
            <h2 id="q-text" class="text-2xl md:text-3xl text-white font-bold mb-4 drop-shadow-md">Soalan di sini</h2>
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <!-- Options populated by JS -->
            </div>
            <div class="mt-4 text-green-300 text-xl font-bold">Markah: <span id="score-display">0</span></div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="glass-panel p-8 rounded-xl text-center hidden flex-col items-center pointer-events-auto">
            <h1 class="text-4xl text-yellow-400 mb-4 drop-shadow-md">Permainan Tamat!</h1>
            <p class="text-white text-2xl mb-6">Markah Akhir Anda: <span id="final-score" class="font-bold text-green-400"></span></p>
            <button id="restart-btn" class="btn-restart text-white text-2xl font-bold py-3 px-8 rounded">Main Semula</button>
        </div>
        
    </div>
</div>

<script>
    /* =========================================================
       GAME DATA
    ========================================================= */
    const questionsData = [
        {
            q: "1. 'Seorang ayah' merupakan frasa…",
            opts: [
                { id: 'A', text: "Frasa Nama" },
                { id: 'B', text: "Frasa Kerja" },
                { id: 'C', text: "Frasa Adjektif" },
                { id: 'D', text: "Frasa Sendi Nama" }
            ],
            ans: 'A'
        },
        {
            q: "2. Antara berikut, yang manakah frasa nama?",
            opts: [
                { id: 'A', text: "Sangat cantik" },
                { id: 'B', text: "Daripada ibu" },
                { id: 'C', text: "Seekor kucing belang" },
                { id: 'D', text: "Mencuci baju" }
            ],
            ans: 'C'
        },
        {
            q: "3. 'Sangat cantik' merupakan frasa nama.",
            opts: [
                { id: 'A', text: "Betul" },
                { id: 'B', text: "Salah" }
            ],
            ans: 'B'
        },
        {
            q: "4. Pilih frasa nama yang betul:",
            opts: [
                { id: 'A', text: "Sungguh mahal" },
                { id: 'B', text: "Kereta ayah saya" },
                { id: 'C', text: "Daripada nenek dia" },
                { id: 'D', text: "Bermain bola" }
            ],
            ans: 'B'
        },
        {
            q: "5. 'Bunga Mawar itu' ialah frasa nama.",
            opts: [
                { id: 'A', text: "Betul" },
                { id: 'B', text: "Salah" }
            ],
            ans: 'A'
        },
        {
            q: "6. Yang manakah frasa nama?",
            opts: [
                { id: 'A', text: "Sangat rajin" },
                { id: 'B', text: "Ke pasar raya Giant" },
                { id: 'C', text: "Telefon pintar Iphone" },
                { id: 'D', text: "Menyanyikan lagu" }
            ],
            ans: 'C'
        },
        {
            q: "7. Pilih frasa nama yang betul.",
            opts: [
                { id: 'A', text: "Memasak nasi lemak" },
                { id: 'B', text: "Guru besar sekolah" },
                { id: 'C', text: "Sangat bersih dan kemas" },
                { id: 'D', text: "Dari rumah" }
            ],
            ans: 'B'
        }
    ];

    /* =========================================================
       AUDIO SYSTEM (Web Audio API Synthesizer)
    ========================================================= */
    let audioCtx;
    let bgmInterval;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.1);
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t);
            osc.stop(t + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, t);
            osc.frequency.setValueAtTime(1200, t + 0.1); // Ding-ding effect
            gain.gain.setValueAtTime(0.5, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t);
            osc.stop(t + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, t);
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            osc.start(t);
            osc.stop(t + 0.3);
        }
    }

    function startBGM() {
        if (!audioCtx) return;
        stopBGM();
        // Tense Minecraft-ish cave / fast suspense loop
        const notes = [110, 123.47, 146.83, 123.47, 164.81, 146.83, 123.47, 110];
        let i = 0;
        bgmInterval = setInterval(() => {
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(notes[i % notes.length], t);
            
            gain.gain.setValueAtTime(0.05, t); // Low volume for BGM
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            
            osc.start(t);
            osc.stop(t + 0.15);
            i++;
        }, 200); // 200ms per note (fast)
    }

    function stopBGM() {
        if (bgmInterval) {
            clearInterval(bgmInterval);
        }
    }

    /* =========================================================
       CANVAS & GAME ENGINE
    ========================================================= */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const questionPanel = document.getElementById('question-panel');
    const endScreen = document.getElementById('end-screen');
    const qText = document.getElementById('q-text');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score-display');
    const finalScoreDisplay = document.getElementById('final-score');

    let width, height;
    let pointerX = -1000;
    let pointerY = -1000;
    let gameLoopReq;
    let ducks = [];
    
    // Game State
    let state = 'START'; // START, PLAYING, END
    let score = 0;
    let qIndex = 0;

    // Resize canvas
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Input tracking (Mouse & Touch)
    function updatePointer(e) {
        if (e.touches && e.touches.length > 0) {
            pointerX = e.touches[0].clientX;
            pointerY = e.touches[0].clientY;
        } else {
            pointerX = e.clientX;
            pointerY = e.clientY;
        }
    }

    window.addEventListener('pointermove', updatePointer);
    window.addEventListener('touchmove', updatePointer, {passive: false}); // passive false to allow preventDefault if needed

    // Duck Class
    class Duck {
        constructor(letter, laneY) {
            this.letter = letter;
            this.w = 50;
            this.h = 50;
            this.y = laneY;
            // Random start left or right
            this.direction = Math.random() > 0.5 ? 1 : -1;
            this.x = this.direction === 1 ? -100 : width + 100;
            // Speed varies slightly
            this.baseSpeed = (Math.random() * 2 + 2); // 2 to 4
        }

        update() {
            // Move
            this.x += this.baseSpeed * this.direction;

            // Bounce off edges
            if (this.x > width + 150) {
                this.direction = -1;
                this.x = width + 150;
            } else if (this.x < -150) {
                this.direction = 1;
                this.x = -150;
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Draw Sign Pole
            ctx.fillStyle = '#8B4513'; // brown
            ctx.fillRect(20, -70, 10, 50);
            
            // Draw Sign Board
            ctx.fillStyle = '#DEB887'; // wood color
            ctx.fillRect(0, -100, 50, 40);
            ctx.strokeStyle = '#5C2E0B';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, -100, 50, 40);
            
            // Letter on Sign
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px "Comic Sans MS"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.letter, 25, -80);

            // Draw Duck Body (Pixel-ish)
            // Flip horizontal if moving left
            if (this.direction === -1) {
                ctx.scale(-1, 1);
                ctx.translate(-50, 0); // adjust for width
            }

            ctx.fillStyle = '#FFD700'; // Yellow body
            ctx.fillRect(0, 0, 50, 40); // Main body
            ctx.fillRect(25, -25, 30, 30); // Head

            ctx.fillStyle = '#FFA500'; // Orange beak
            ctx.fillRect(55, -15, 20, 10); 

            ctx.fillStyle = '#000'; // Eye
            ctx.fillRect(40, -20, 5, 5);

            ctx.restore();
        }

        // Check if pointer hit the duck or its sign
        isHit(x, y) {
            // Bounding box combining duck and sign
            // Duck is roughly this.x to this.x+50 (or similar based on direction)
            // Sign goes up to this.y - 100
            const left = this.x - 20; // Give some leeway
            const right = this.x + 70;
            const top = this.y - 110;
            const bottom = this.y + 40;

            return (x >= left && x <= right && y >= top && y <= bottom);
        }
    }

    // Load a Question
    function loadQuestion() {
        if (qIndex >= questionsData.length) {
            endGame();
            return;
        }

        const q = questionsData[qIndex];
        qText.innerText = q.q;
        optionsContainer.innerHTML = '';
        
        q.opts.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'bg-slate-700/80 border-2 border-slate-500 rounded p-3 text-white text-left';
            div.innerHTML = `<span class="font-bold text-yellow-400 text-xl mr-2">${opt.id}:</span> ${opt.text}`;
            optionsContainer.appendChild(div);
        });

        scoreDisplay.innerText = score;

        // Spawn Ducks
        ducks = [];
        // Determine lanes based on screen height
        const lanes = [height * 0.35, height * 0.65, height * 0.9];
        
        q.opts.forEach((opt, index) => {
            // Distribute ducks across lanes randomly or orderly
            const laneY = lanes[index % lanes.length];
            const duck = new Duck(opt.id, laneY);
            // Stagger starting X if they are in the same lane
            duck.x = (duck.direction === 1) ? -100 - (index * 150) : width + 100 + (index * 150);
            ducks.push(duck);
        });
    }

    // Hit Logic
    window.addEventListener('pointerdown', (e) => {
        if (state !== 'PLAYING') return;
        
        // Ensure audio context is good
        initAudio();

        updatePointer(e);
        playSound('shoot');

        // Check hits (reverse order to hit front-most first)
        let hitDuck = null;
        for (let i = ducks.length - 1; i >= 0; i--) {
            if (ducks[i].isHit(pointerX, pointerY)) {
                hitDuck = ducks[i];
                break;
            }
        }

        if (hitDuck) {
            const q = questionsData[qIndex];
            if (hitDuck.letter === q.ans) {
                // Correct!
                playSound('correct');
                score += 10;
                qIndex++;
                loadQuestion();
            } else {
                // Wrong!
                playSound('wrong');
                score -= 2;
                scoreDisplay.innerText = score;
                // Shake screen
                container.classList.remove('shake-active');
                void container.offsetWidth; // trigger reflow
                container.classList.add('shake-active');
            }
        }
    });

    // Drawing Helpers
    function drawMinecraftBackground() {
        // Sky is handled by CSS body bg, but we draw dirt blocks
        const tileSize = 60;
        
        // Draw dirt shelves where ducks walk (lanes)
        const lanes = [height * 0.35, height * 0.65, height * 0.9];
        
        lanes.forEach(y => {
            // Draw shelf block row
            for(let x = 0; x < width; x += tileSize) {
                // Dirt
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x, y + 40, tileSize, tileSize);
                
                // Grass Top
                ctx.fillStyle = '#228B22';
                ctx.fillRect(x, y + 40, tileSize, 10);
                
                // Pixel details
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(x + 10, y + 50, 10, 10);
                ctx.fillRect(x + 40, y + 70, 10, 10);
                
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(x + 30, y + 40, 10, 10);
            }
        });
    }

    function drawFlashlight() {
        // Dark Overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, width, height);

        // Cutout hole
        const radius = Math.max(120, Math.min(width, height) * 0.15); // Responsive size
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(pointerX, pointerY, radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Reset composite operation
        ctx.globalCompositeOperation = 'source-over';

        // Draw Crosshair (Red)
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        // Circle
        ctx.arc(pointerX, pointerY, radius - 20, 0, Math.PI * 2);
        ctx.stroke();
        
        // Lines
        ctx.beginPath();
        ctx.moveTo(pointerX - radius + 10, pointerY);
        ctx.lineTo(pointerX + radius - 10, pointerY);
        ctx.moveTo(pointerX, pointerY - radius + 10);
        ctx.lineTo(pointerX, pointerY + radius - 10);
        ctx.stroke();
    }

    // Main Game Loop
    function loop() {
        if (state === 'PLAYING') {
            ctx.clearRect(0, 0, width, height);
            
            drawMinecraftBackground();

            // Update & Draw Ducks
            ducks.forEach(duck => {
                duck.update();
                duck.draw(ctx);
            });

            drawFlashlight();
        }
        
        gameLoopReq = requestAnimationFrame(loop);
    }

    // State Management
    function startGame() {
        initAudio();
        startBGM();
        
        state = 'PLAYING';
        score = 0;
        qIndex = 0;
        
        startScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        questionPanel.classList.remove('hidden');
        questionPanel.style.display = 'flex'; // Tailwind hidden override
        
        loadQuestion();
    }

    function endGame() {
        state = 'END';
        stopBGM();
        questionPanel.classList.add('hidden');
        questionPanel.style.display = 'none';
        endScreen.classList.remove('hidden');
        endScreen.style.display = 'flex';
        finalScoreDisplay.innerText = score;
        ctx.clearRect(0, 0, width, height); // Clear canvas
    }

    // Button Listeners
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);

    // Initial Start Loop
    requestAnimationFrame(loop);

</script>
</body>
</html>
